openapi: 3.1.0
info:
  title: Agent Orchestrator HTTP daemon
  version: 0.1.0
  description: |
    Loopback-only HTTP surface served by the Go daemon. This document describes
    the registered /api/v1 project routes and the shared error envelope used by
    OpenAPI-backed 501 responses. Daemon control endpoints such as /healthz,
    /readyz, /shutdown, and /mux are intentionally outside this REST spec.

servers:
  - url: http://127.0.0.1:3001
    description: Local daemon (loopback only)

tags:
  - name: projects
    description: Project registry, configuration, and lifecycle administration
  - name: sessions
    description: Agent session lifecycle and messaging

paths:
  /api/v1/projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List active registered projects
      responses:
        "200":
          description: Projects listed
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectSummary" }
        "500":
          description: Failed to load projects
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              example: { error: internal, code: PROJECTS_LIST_FAILED, message: "Failed to load projects" }
        "501": { $ref: "#/components/responses/NotImplemented" }

    post:
      operationId: addProject
      tags: [projects]
      summary: Register a new project from a git repository path
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddProjectRequest" }
      responses:
        "201":
          description: Project registered
          content:
            application/json:
              schema:
                type: object
                required: [project]
                properties:
                  project: { $ref: "#/components/schemas/Project" }
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              examples:
                invalidJson: { value: { error: bad_request, code: INVALID_JSON, message: "Invalid JSON body" } }
                pathRequired: { value: { error: bad_request, code: PATH_REQUIRED, message: "Repository path is required" } }
                notAGitRepo: { value: { error: bad_request, code: NOT_A_GIT_REPO, message: "Repository path must point to a git repository" } }
        "409":
          description: Conflict with an already-registered project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              examples:
                pathAlready:
                  value:
                    error: conflict
                    code: PATH_ALREADY_REGISTERED
                    message: "A project at this path is already registered"
                    details:
                      existingProjectId: existing-project-id
                      suggestedProjectId: suggested-project-id
                idAlready:
                  value:
                    error: conflict
                    code: ID_ALREADY_REGISTERED
                    message: "A project with this id is already registered for a different path"
                    details:
                      existingProjectId: existing-project-id
                      suggestedProjectId: suggested-project-id
        "501": { $ref: "#/components/responses/NotImplemented" }

  /api/v1/projects/reload:
    post:
      operationId: reloadProjects
      tags: [projects]
      summary: Invalidate cached config and re-scan the global registry
      responses:
        "200":
          description: Reload complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReloadResult" }
        "500":
          description: Reload failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              example: { error: internal, code: RELOAD_FAILED, message: "Failed to reload projects" }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /api/v1/projects/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectIDPath"
    get:
      operationId: getProject
      tags: [projects]
      summary: Fetch one project; discriminates ok vs degraded
      responses:
        "200":
          description: Project resolved (status discriminates ok vs degraded)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectGetResponse" }
        "404": { $ref: "#/components/responses/ProjectNotFound" }
        "500":
          description: Failed to load project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              example: { error: internal, code: PROJECT_LOAD_FAILED, message: "Failed to load project" }
        "501": { $ref: "#/components/responses/NotImplemented" }
    patch:
      operationId: updateProjectConfig
      tags: [projects]
      summary: Patch behaviour-only fields (not implemented until config persistence lands)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProjectConfigRequest" }
      responses:
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              examples:
                invalidJson: { value: { error: bad_request, code: INVALID_JSON, message: "Invalid JSON body" } }
                identityFrozen:
                  value:
                    error: bad_request
                    code: IDENTITY_FROZEN
                    message: "Identity fields cannot be patched"
                    details: { fields: [projectId, path, repo, defaultBranch] }
                invalidConfig: { value: { error: bad_request, code: INVALID_LOCAL_CONFIG, message: "Local project config failed validation" } }
        "404": { $ref: "#/components/responses/ProjectNotFound" }
        "409":
          description: Project not in a patchable state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              examples:
                degraded: { value: { error: conflict, code: PROJECT_DEGRADED, message: "Project config is degraded; repair before patching" } }
                missingPath: { value: { error: conflict, code: PROJECT_MISSING_PATH, message: "Project registry entry is missing a path" } }
        "501":
          description: Behaviour config persistence is not wired yet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              example: { error: not_implemented, code: PROJECT_CONFIG_NOT_IMPLEMENTED, message: "Project config patching is not available until config persistence is wired" }
    delete:
      operationId: removeProject
      tags: [projects]
      summary: Archive a project; hides it from active lists while preserving id references
      responses:
        "200":
          description: Project archived
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RemoveProjectResult" }
        "400":
          description: Invalid project id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              example: { error: bad_request, code: INVALID_PROJECT_ID, message: "Project id failed storage-path validation" }
        "404": { $ref: "#/components/responses/ProjectNotFound" }
        "500":
          description: Removal failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              example: { error: internal, code: PROJECT_REMOVE_FAILED, message: "Failed to remove project" }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /api/v1/projects/{id}/repair:
    parameters:
      - $ref: "#/components/parameters/ProjectIDPath"
    post:
      operationId: repairProject
      tags: [projects]
      summary: Repair a degraded project where automatic recovery is available
      x-replaces:
        - "POST /api/v1/projects/{id}"
      responses:
        "200":
          description: Project repaired
          content:
            application/json:
              schema:
                type: object
                required: [project]
                properties:
                  project: { $ref: "#/components/schemas/Project" }
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              examples:
                notDegraded: { value: { error: bad_request, code: PROJECT_NOT_DEGRADED, message: "Project does not need repair" } }
                notAvailable: { value: { error: bad_request, code: REPAIR_NOT_AVAILABLE, message: "Automatic repair is not available for this degraded config" } }
        "404": { $ref: "#/components/responses/ProjectNotFound" }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /api/v1/sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List sessions
      parameters:
        - name: project
          in: query
          schema: { type: string }
        - name: active
          in: query
          schema: { type: boolean }
        - name: orchestratorOnly
          in: query
          schema: { type: boolean }
        - name: fresh
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Sessions listed
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items: { $ref: "#/components/schemas/Session" }
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
        "501": { $ref: "#/components/responses/NotImplemented" }
    post:
      operationId: spawnSession
      tags: [sessions]
      summary: Spawn a new agent session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SpawnSessionRequest" }
      responses:
        "201":
          description: Session spawned
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session: { $ref: "#/components/schemas/Session" }
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              examples:
                invalidJson: { value: { error: bad_request, code: INVALID_JSON, message: "Invalid JSON body" } }
                projectRequired: { value: { error: bad_request, code: PROJECT_ID_REQUIRED, message: "projectId is required" } }
                promptTooLong: { value: { error: bad_request, code: PROMPT_TOO_LONG, message: "prompt is too long" } }
        "404": { $ref: "#/components/responses/ProjectNotFound" }
        "500": { $ref: "#/components/responses/SessionOperationFailed" }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /api/v1/sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/SessionIDPath"
    get:
      operationId: getSession
      tags: [sessions]
      summary: Fetch one session
      responses:
        "200":
          description: Session fetched
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session: { $ref: "#/components/schemas/Session" }
        "404": { $ref: "#/components/responses/SessionNotFound" }
        "501": { $ref: "#/components/responses/NotImplemented" }
    patch:
      operationId: renameSession
      tags: [sessions]
      summary: Rename a session display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName: { type: string, minLength: 1 }
      responses:
        "200":
          description: Session renamed
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session: { $ref: "#/components/schemas/Session" }
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
        "404": { $ref: "#/components/responses/SessionNotFound" }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /api/v1/sessions/{sessionId}/restore:
    parameters:
      - $ref: "#/components/parameters/SessionIDPath"
    post:
      operationId: restoreSession
      tags: [sessions]
      summary: Restore a terminated session
      responses:
        "200":
          description: Session restored
          content:
            application/json:
              schema:
                type: object
                required: [ok, sessionId, session]
                properties:
                  ok: { type: boolean }
                  sessionId: { type: string }
                  session: { $ref: "#/components/schemas/Session" }
        "404": { $ref: "#/components/responses/SessionNotFound" }
        "409": { $ref: "#/components/responses/SessionConflict" }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /api/v1/sessions/{sessionId}/kill:
    parameters:
      - $ref: "#/components/parameters/SessionIDPath"
    post:
      operationId: killSession
      tags: [sessions]
      summary: Mark a session terminated and tear down runtime/workspace resources
      responses:
        "200":
          description: Kill attempted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KillSessionResponse" }
        "404": { $ref: "#/components/responses/SessionNotFound" }
        "409": { $ref: "#/components/responses/SessionConflict" }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /api/v1/sessions/{sessionId}/send:
    parameters:
      - $ref: "#/components/parameters/SessionIDPath"
    post:
      operationId: sendSessionMessage
      tags: [sessions]
      summary: Send a message to a running session's agent
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendSessionMessageRequest" }
      responses:
        "200":
          description: Message accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SendSessionMessageResponse" }
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
              examples:
                invalidJson: { value: { error: bad_request, code: INVALID_JSON, message: "Invalid JSON body" } }
                messageRequired: { value: { error: bad_request, code: MESSAGE_REQUIRED, message: "Message is required" } }
        "404": { $ref: "#/components/responses/SessionNotFound" }
        "500": { $ref: "#/components/responses/SessionOperationFailed" }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /api/v1/orchestrators:
    post:
      operationId: spawnOrchestrator
      tags: [sessions]
      summary: Spawn an orchestrator session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SpawnOrchestratorRequest" }
      responses:
        "201":
          description: Orchestrator spawned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SpawnOrchestratorResponse" }
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIError" }
        "404": { $ref: "#/components/responses/ProjectNotFound" }
        "500": { $ref: "#/components/responses/SessionOperationFailed" }
        "501": { $ref: "#/components/responses/NotImplemented" }

components:
  parameters:
    ProjectIDPath:
      name: id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
      description: Project identifier (registry key).

    SessionIDPath:
      name: sessionId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
      description: Session identifier, e.g. project-1.

  responses:
    NotImplemented:
      description: |
        Route is registered but the handler has not been implemented yet.
        The body carries the locked APIError envelope plus a `spec` field
        containing this operation's slice of the OpenAPI document so
        callers can discover the contract from the endpoint itself.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/NotImplementedResponse" }

    ProjectNotFound:
      description: Project not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/APIError" }
          example: { error: not_found, code: PROJECT_NOT_FOUND, message: "Unknown project" }

    SessionNotFound:
      description: Session not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/APIError" }
          example: { error: not_found, code: SESSION_NOT_FOUND, message: "Unknown session" }

    SessionConflict:
      description: Session is not in a valid state for the requested operation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/APIError" }
          examples:
            notRestorable: { value: { error: conflict, code: SESSION_NOT_RESTORABLE, message: "Session is not restorable" } }
            incompleteHandle: { value: { error: conflict, code: SESSION_INCOMPLETE_HANDLE, message: "Session is missing runtime or workspace handles" } }

    SessionOperationFailed:
      description: Session operation failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/APIError" }
          example: { error: internal, code: SESSION_OPERATION_FAILED, message: "Session operation failed" }

  schemas:
    APIError:
      type: object
      required: [error, code, message]
      properties:
        error: { type: string, description: "Short kind, e.g. not_found" }
        code: { type: string, description: "SCREAMING_SNAKE machine code" }
        message: { type: string, description: "Human-readable detail" }
        requestId: { type: string }
        details:
          type: object
          additionalProperties: true

    NotImplementedResponse:
      allOf:
        - $ref: "#/components/schemas/APIError"
        - type: object
          required: [spec]
          properties:
            spec:
              type: object
              description: |
                The OpenAPI Operation object for this method+path, served
                inline so consumers discover the contract from the 501
                response without fetching the full spec. Mirrors the YAML
                shape — see /api/v1/openapi.yaml for the full document.

    ProjectSummary:
      type: object
      required: [id, name, sessionPrefix]
      properties:
        id: { type: string }
        name: { type: string }
        sessionPrefix: { type: string }
        resolveError:
          type: string
          description: Present iff the project is degraded.

    Project:
      type: object
      required: [id, name, path, repo, defaultBranch]
      properties:
        id: { type: string }
        name: { type: string }
        path: { type: string }
        repo:
          type: string
          description: "\"owner/name\" or empty string when unset"
        defaultBranch: { type: string, default: main }
        agent: { type: string }
        tracker: { $ref: "#/components/schemas/TrackerConfig" }
        scm: { $ref: "#/components/schemas/SCMConfig" }

    DegradedProject:
      type: object
      required: [id, name, path, resolveError]
      properties:
        id: { type: string }
        name: { type: string }
        path: { type: string }
        resolveError: { type: string }

    ProjectGetResponse:
      type: object
      required: [status, project]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        project:
          oneOf:
            - $ref: "#/components/schemas/Project"
            - $ref: "#/components/schemas/DegradedProject"
    AddProjectRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Repository path; supports ~ home-expansion. Must be a git repo.
        projectId:
          type: string
          description: Optional override; defaults to basename(path).
        name:
          type: string
          description: Optional display name; defaults to projectId.

    UpdateProjectConfigRequest:
      type: object
      description: |
        Behaviour-only patch. Identity fields (projectId, path, repo,
        defaultBranch) are rejected with 400 IDENTITY_FROZEN. The current Go
        handler returns 501 PROJECT_CONFIG_NOT_IMPLEMENTED until config
        persistence exists.
      properties:
        agent: { type: string }
        tracker: { $ref: "#/components/schemas/TrackerConfig" }
        scm: { $ref: "#/components/schemas/SCMConfig" }

    RemoveProjectResult:
      type: object
      required: [projectId, removedStorageDir]
      properties:
        projectId: { type: string }
        removedStorageDir: { type: boolean }

    ReloadResult:
      type: object
      required: [reloaded, projectCount, degradedCount]
      properties:
        reloaded: { type: boolean }
        projectCount: { type: integer }
        degradedCount: { type: integer }


    Session:
      type: object
      required: [id, projectId, kind, activity, isTerminated, createdAt, updatedAt, status]
      properties:
        id: { type: string }
        projectId: { type: string }
        issueId: { type: string }
        kind: { type: string, enum: [worker, orchestrator] }
        harness: { type: string, enum: ["", claude-code, codex, aider, opencode] }
        activity: { $ref: "#/components/schemas/SessionActivity" }
        isTerminated: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        status:
          type: string
          enum: [working, pr_open, draft, ci_failed, review_pending, changes_requested, approved, mergeable, merged, needs_input, idle, terminated]

    SessionActivity:
      type: object
      required: [state, lastActivityAt]
      properties:
        state: { type: string, enum: [active, idle, waiting_input, exited] }
        lastActivityAt: { type: string, format: date-time }

    SpawnSessionRequest:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string }
        issueId: { type: string }
        kind: { type: string, enum: [worker, orchestrator], default: worker }
        harness: { type: string, enum: ["", claude-code, codex, aider, opencode] }
        branch: { type: string }
        prompt: { type: string, maxLength: 4096 }
        agentRules: { type: string }

    SendSessionMessageRequest:
      type: object
      required: [message]
      properties:
        message: { type: string, minLength: 1, maxLength: 4096 }

    SendSessionMessageResponse:
      type: object
      required: [ok, sessionId, message]
      properties:
        ok: { type: boolean }
        sessionId: { type: string }
        message: { type: string }

    KillSessionResponse:
      type: object
      required: [ok, sessionId]
      properties:
        ok: { type: boolean }
        sessionId: { type: string }
        freed: { type: boolean }

    SpawnOrchestratorRequest:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string }
        clean: { type: boolean, default: false }

    SpawnOrchestratorResponse:
      type: object
      required: [orchestrator]
      properties:
        orchestrator:
          type: object
          required: [id, projectId]
          properties:
            id: { type: string }
            projectId: { type: string }
            projectName: { type: string }

    # ---- Behaviour config blobs ----

    TrackerConfig:
      type: object
      additionalProperties: true
      properties:
        plugin: { type: string }
        package: { type: string }
        path: { type: string }

    SCMConfig:
      type: object
      additionalProperties: true
      properties:
        plugin: { type: string }
        package: { type: string }
        path: { type: string }
        webhook:
          type: object
          properties:
            enabled: { type: boolean }
            path: { type: string }
            secretEnvVar: { type: string }
            signatureHeader: { type: string }
            eventHeader: { type: string }
            deliveryHeader: { type: string }
            maxBodyBytes: { type: integer }
