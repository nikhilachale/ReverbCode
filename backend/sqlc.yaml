version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/storage/sqlite/migrations"
    queries: "internal/storage/sqlite/queries"
    gen:
      go:
        package: "gen"
        out: "internal/storage/sqlite/gen"
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - column: "sessions.kind"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "SessionKind"
          - column: "sessions.harness"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "AgentHarness"
          - column: "sessions.activity_state"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "ActivityState"
          - column: "sessions.activity_source"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "ActivitySource"
